version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mememory
    main: ./cmd/mememory
    binary: mememory
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: mememory-server
    main: ./cmd/mememory-server
    binary: mememory-server
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: mememory-archives
    builds:
      - mememory
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: mememory-server-archives
    builds:
      - mememory-server
    format: tar.gz
    name_template: >-
      mememory-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: scott-walker
    name: mememory


services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mememory-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DATA_DIR}/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mememory
      POSTGRES_USER: mememory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mememory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mememory"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: mememory-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${DATA_DIR}/ollama:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12

  admin:
    image: ghcr.io/scott-walker/mememory:${MEMEMORY_VERSION:-latest}
    container_name: mememory
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-4200}:4200"
    environment:
      DATABASE_URL: postgres://mememory:${POSTGRES_PASSWORD:-mememory}@postgres:5432/mememory?sslmode=disable
      OLLAMA_URL: http://ollama:11434
      ADMIN_PORT: "4200"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

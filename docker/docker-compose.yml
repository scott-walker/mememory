services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mememory-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${MEMORY_DATA_DIR:-~/.mememory}/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    build:
      context: ..
      dockerfile: docker/ollama.Dockerfile
    container_name: mememory-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${MEMORY_DATA_DIR:-~/.mememory}/ollama:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mememory-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-4200}:4200"
    environment:
      DATABASE_URL: postgres://memory:${POSTGRES_PASSWORD:-memory}@postgres:5432/memory?sslmode=disable
      OLLAMA_URL: http://ollama:11434
      ADMIN_PORT: "4200"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
